<!DOCTYPE html>

<html lang="zh-CN">

<head>

<meta charset="UTF-8" />

<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>

<title>ChatGPT Mobile</title>

<style>

* {

  box-sizing: border-box;

}

body {

  margin: 0;

  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif;

  background: #212121;

  color: #fff;

  height: 100vh;

  overflow: hidden;

}

.app {

  height: 100vh;

  display: flex;

  flex-direction: column;

  background: #212121;

}

.header {

  height: 52px;

  padding: 0 16px;

  border-bottom: 1px solid #333;

  display: flex;

  align-items: center;

  justify-content: space-between;

  background: #212121;

}

.header-title {

  font-size: 17px;

  font-weight: 600;

}

.icon-btn {

  width: 36px;

  height: 36px;

  border: none;

  background: transparent;

  color: #fff;

  font-size: 22px;

  border-radius: 50%;

}

.chat {

  flex: 1;

  overflow-y: auto;

  padding: 18px 14px 120px;

}

.message-row {

  display: flex;

  margin-bottom: 18px;

}

.message-row.user {

  justify-content: flex-end;

}

.message-row.ai {

  justify-content: flex-start;

}

.bubble {

  max-width: 82%;

  padding: 12px 15px;

  border-radius: 20px;

  font-size: 15.5px;

  line-height: 1.5;

  white-space: pre-wrap;

  word-break: break-word;

}

.user .bubble {

  background: #2f2f2f;

  color: #fff;

  border-bottom-right-radius: 6px;

}

.ai .bubble {

  background: transparent;

  color: #f1f1f1;

  padding-left: 4px;
}

.avatar {

  width: 28px;

  height: 28px;

  background: #10a37f;

  border-radius: 50%;

  margin-right: 8px;

  display: flex;

  align-items: center;

  justify-content: center;

  font-size: 13px;

  flex-shrink: 0;

}

.input-area {

  position: fixed;

  left: 0;

  right: 0;

  bottom: 0;

  padding: 10px 12px 18px;

  background: linear-gradient(to top, #212121 85%, transparent);

}

.input-box {

  min-height: 52px;

  background: #2f2f2f;

  border: 1px solid #444;

  border-radius: 28px;

  display: flex;

  align-items: flex-end;

  padding: 7px;

  gap: 6px;

}

textarea {

  flex: 1;

  resize: none;

  border: none;

  outline: none;

  background: transparent;

  color: #fff;

  font-size: 16px;

  line-height: 22px;

  max-height: 120px;

  padding: 8px 4px;

  font-family: inherit;

}

textarea::placeholder {

  color: #aaa;

}

.round-btn {

  width: 38px;

  height: 38px;

  border-radius: 50%;

  border: none;

  background: transparent;

  color: #fff;

  font-size: 20px;

  flex-shrink: 0;

}

.send-btn {

  background: #fff;

  color: #000;

  font-size: 18px;

}

.preview {

  max-width: 120px;

  border-radius: 12px;

  margin: 6px 0 0 8px;

  display: none;

}

.hidden {

  display: none;

}

.typing {

  color: #aaa;

  font-size: 14px;

  margin-left: 38px;

}

</style>

</head>

<body>

<div class="app">

  <div class="header">

    <button class="icon-btn">☰</button>

    <div class="header-title">ChatGPT</div>

    <button class="icon-btn">＋</button>
</div>

  <div id="chat" class="chat">

    <div class="message-row ai">

      <div class="avatar">AI</div>

      <div class="bubble">你好，我是Jerry,我可以帮你什么？</div>

    </div>

  </div>

  <div class="input-area">

    <img id="preview" class="preview">

    <div class="input-box">

      <button class="round-btn" onclick="chooseImage()">＋</button>

      <textarea id="text" rows="1" placeholder="Message ChatGPT"></textarea>

      <button class="round-btn" onclick="voice()">🎤</button>

      <button class="round-btn send-btn" onclick="send()">↑</button>

      <input id="imageInput" class="hidden" type="file" accept="image/*">

    </div>

  </div>

</div>

<script>

const WORKER_URL = "https://jerry123.834833904.workers.dev/";

const chat = document.getElementById("chat");

const textBox = document.getElementById("text");

const imageInput = document.getElementById("imageInput");

const preview = document.getElementById("preview");

let imageBase64 = null;

function addMessage(content, type) {

  const row = document.createElement("div");

  row.className = "message-row " + type;

  if (type === "ai") {

    row.innerHTML = `

      <div class="avatar">AI</div>

      <div class="bubble">${escapeHtml(content)}</div>

    `;

  } else {

    row.innerHTML = `

      <div class="bubble">${escapeHtml(content)}</div>

    `;

  }

  chat.appendChild(row);

  chat.scrollTop = chat.scrollHeight;

}

function addTyping() {

  const div = document.createElement("div");

  div.id = "typing";

  div.className = "typing";

  div.innerText = "ChatGPT 正在思考...";

  chat.appendChild(div);

  chat.scrollTop = chat.scrollHeight;

}

function removeTyping() {

  const t = document.getElementById("typing");

  if (t) t.remove();

}

function escapeHtml(text) {

  return String(text)

    .replaceAll("&", "&amp;")

    .replaceAll("<", "&lt;")

    .replaceAll(">", "&gt;");

}

async function send() {

  const text = textBox.value.trim();

  if (!text && !imageBase64) return;

  if (text) addMessage(text, "user");

  if (imageBase64) addMessage("📷 已发送图片", "user");

  textBox.value = "";

  preview.style.display = "none";
addTyping();

  try {

    const res = await fetch(WORKER_URL, {

      method: "POST",

      headers: {

        "Content-Type": "application/json"

      },

      body: JSON.stringify({

        text,

        image: imageBase64

      })

    });

    const data = await res.json();

    removeTyping();

    addMessage(data.reply || "没有返回内容", "ai");

  } catch (err) {

    removeTyping();

    addMessage("请求失败，请检查 Worker 地址。", "ai");

  }

  imageBase64 = null;

}

function chooseImage() {

  imageInput.click();

}

imageInput.onchange = function () {

  const file = this.files[0];

  if (!file) return;

  const reader = new FileReader();

  reader.onload = function () {

    imageBase64 = reader.result;

    preview.src = imageBase64;

    preview.style.display = "block";

  };

  reader.readAsDataURL(file);

};

function voice() {

  const SpeechRecognition =

    window.SpeechRecognition || window.webkitSpeechRecognition;

  if (!SpeechRecognition) {

    alert("当前浏览器不支持语音识别，建议用 Chrome。");

    return;

  }

  const rec = new SpeechRecognition();

  rec.lang = "zh-CN";

  rec.interimResults = false;

  rec.onresult = function (e) {

    textBox.value = e.results[0][0].transcript;

  };

  rec.start();

}

textBox.addEventListener("input", function () {

  this.style.height = "auto";

  this.style.height = Math.min(this.scrollHeight, 120) + "px";

});

</script>

</body>

</html>
