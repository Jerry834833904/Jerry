<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>网站维护中</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC",
        "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
    }

    body {
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: linear-gradient(135deg, #f5f7fa, #e4ecfb);
      color: #333;
    }

    .card {
      width: 90%;
      max-width: 520px;
      background: #ffffff;
      padding: 40px 30px;
      border-radius: 20px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
      text-align: center;
    }

    .icon {
      font-size: 56px;
      margin-bottom: 20px;
    }

    h1 {
      font-size: 32px;
      color: #222;
      margin-bottom: 12px;
    }

    p {
      font-size: 18px;
      color: #666;
      line-height: 1.8;
      margin-bottom: 12px;
    }

    .wechat {
      margin-top: 20px;
      display: inline-block;
      background: #07c160;
      color: white;
      padding: 12px 22px;
      border-radius: 12px;
      font-size: 18px;
      font-weight: bold;
      text-decoration: none;
    }

    .tip {
      margin-top: 18px;
      font-size: 14px;
      color: #999;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon">🚧</div>
    <h1>网站维护中</h1>
    <p>抱歉，网站当前正在维护升级中。</p>
    <p>如有问题，请联系微信号：</p>
    <a class="wechat" href="javascript:void(0);">jeri926</a>
    <div class="tip">感谢您的理解与支持</div>
  </div>
</body>
</html>
