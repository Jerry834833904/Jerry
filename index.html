<!DOCTYPE html>

<html lang="zh-CN">

<head>

<meta charset="UTF-8" />

<meta name="viewport" content="width=device-width, initial-scale=1.0" />

<title>Jerry AI</title>

<style>

*{box-sizing:border-box}

body{

  margin:0;

  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Arial,sans-serif;

  background:#212121;

  color:#fff;

}

.app{

  height:100vh;

  display:flex;

  flex-direction:column;

}

.header{

  height:56px;

  display:flex;

  align-items:center;

  justify-content:space-between;

  padding:0 16px;

  border-bottom:1px solid #333;

  background:#212121;

}

.logo{

  font-size:18px;

  font-weight:600;

}

.new-btn{

  background:#2f2f2f;

  color:#fff;

  border:1px solid #444;

  border-radius:20px;

  padding:8px 14px;

}

.chat{

  flex:1;

  overflow-y:auto;

  padding:18px 14px 120px;

}

.welcome{

  text-align:center;

  margin-top:18vh;

  color:#ddd;

}

.welcome h1{

  font-size:30px;

  margin-bottom:10px;

}

.message{

  max-width:850px;

  margin:18px auto;

  display:flex;

  gap:12px;

}

.avatar{

  width:32px;

  height:32px;

  border-radius:50%;

  background:#10a37f;

  display:flex;

  align-items:center;

  justify-content:center;

  font-weight:bold;

  flex-shrink:0;

}

.user .avatar{

  background:#555;

}

.bubble{

  line-height:1.65;

  white-space:pre-wrap;

  font-size:16px;

}

.user{

  flex-direction:row-reverse;

}

.user .bubble{

  background:#2f2f2f;

  padding:12px 15px;

  border-radius:18px;

}

.ai .bubble{

  padding-top:4px;

}

.input-area{

  position:fixed;

  bottom:0;

  left:0;

  right:0;

  background:linear-gradient(transparent,#212121 25%);

  padding:30px 12px 18px;

}

.input-box{

  max-width:850px;

  margin:auto;

  background:#2f2f2f;

  border:1px solid #444;

  border-radius:26px;

  display:flex;

  align-items:flex-end;

  padding:10px;

}

textarea{

  flex:1;

  resize:none;

  max-height:160px;

  min-height:24px;

  background:transparent;

  border:none;

  outline:none;

  color:#fff;

  font-size:16px;

  padding:8px;

}

button{

  cursor:pointer;

}

.icon-btn{

  width:38px;

  height:38px;

  border-radius:50%;

  border:none;

  background:#fff;

  color:#111;

  font-size:18px;

}

.mic-btn{

  background:#444;

  color:#fff;

  margin-right:6px;

}

.typing{

  color:#aaa;

}

.footer-note{

  text-align:center;

  font-size:12px;

  color:#777;

  margin-top:8px;

}

@media(max-width:600px){

  .chat{padding:14px 12px 115px}

  .message{margin:16px auto}

  .bubble{font-size:15px}

}

</style>

</head>

<body>

<div class="app">

  <div class="header">

    <div class="logo">Jerry AI</div>

    <button class="new-btn" onclick="newChat()">新建聊天</button>

  </div>

  <div id="chat" class="chat">

    <div id="welcome" class="welcome">

      <h1>Jerry AI</h1>

      <p>有什么可以帮你？</p>

    </div>

  </div>

  <div class="input-area">

    <div class="input-box">

      <button class="icon-btn mic-btn" onclick="startVoice()">🎤</button>

      <textarea id="input" placeholder="Message Jerry AI..." rows="1"></textarea>

      <button class="icon-btn" onclick="sendMessage()">➤</button>

    </div>

    <div class="footer-note">Jerry AI 可能会出错，请核对重要信息</div>

  </div>

</div>

<script>

const WORKER_URL = "https://jerry123.834833904.workers.dev/";

const chat = document.getElementById("chat");

const input = document.getElementById("input");

const welcome = document.getElementById("welcome");

let messages = JSON.parse(localStorage.getItem("jerry_ai_messages") || "[]");

renderHistory();

input.addEventListener("input", () => {

  input.style.height = "auto";

  input.style.height = input.scrollHeight + "px";

});

input.addEventListener("keydown", e => {

  if (e.key === "Enter" && !e.shiftKey) {
e.preventDefault();

    sendMessage();

  }

});

function renderHistory(){

  if(messages.length > 0) welcome.style.display = "none";

  messages.forEach(m => addMessage(m.role, m.content, false));

}

function saveHistory(){

  localStorage.setItem("jerry_ai_messages", JSON.stringify(messages));

}

function newChat(){

  messages = [];

  localStorage.removeItem("jerry_ai_messages");

  chat.innerHTML = "";

  chat.appendChild(welcome);

  welcome.style.display = "block";

}

function addMessage(role, text, save=true){

  welcome.style.display = "none";

  const msg = document.createElement("div");

  msg.className = "message " + (role === "user" ? "user" : "ai");

  const avatar = document.createElement("div");

  avatar.className = "avatar";

  avatar.textContent = role === "user" ? "你" : "J";

  const bubble = document.createElement("div");

  bubble.className = "bubble";

  bubble.textContent = text;

  msg.appendChild(avatar);

  msg.appendChild(bubble);

  chat.appendChild(msg);

  chat.scrollTop = chat.scrollHeight;

  if(save){

    messages.push({role, content:text});

    saveHistory();

  }

  return bubble;

}

async function sendMessage(){

  const text = input.value.trim();

  if(!text) return;

  addMessage("user", text);

  input.value = "";

  input.style.height = "auto";

  const aiBubble = addMessage("assistant", "正在思考...", false);

  aiBubble.classList.add("typing");

  try{

    const res = await fetch(WORKER_URL, {

      method:"POST",

      headers:{"Content-Type":"application/json"},

      body:JSON.stringify({

        messages: messages.slice(-20)

      })

    });

    const data = await res.json();

    aiBubble.classList.remove("typing");

    aiBubble.textContent = data.reply || "没有收到回复";

    messages.push({role:"assistant", content:aiBubble.textContent});

    saveHistory();

  }catch(err){

    aiBubble.textContent = "连接失败，请检查 Worker 地址或 API Key。";

  }

}

function startVoice(){

  const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;

  if(!SpeechRecognition){

    alert("你的浏览器不支持语音输入，建议用 Chrome 或 Safari。");

    return;

  }

  const recognition = new SpeechRecognition();

  recognition.lang = "zh-CN";

  recognition.start();

  recognition.onresult = function(event){

    input.value = event.results[0][0].transcript;

    input.focus();

  };

}

</script>

</body>

</html>
