<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的Gemini AI</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box;}
        body{background:#f5f5f5;font-family:微软雅黑;max-width:800px;margin:0 auto;padding:20px;}
        #chatBox{height:600px;overflow-y:auto;background:#fff;padding:20px;border-radius:12px;margin-bottom:20px;}
        .item{margin:15px 0;}
        .user{text-align:right;}
        .ai{text-align:left;}
        .content{display:inline-block;padding:12px 16px;border-radius:18px;max-width:70%;line-height:1.6;}
        .user .content{background:#0088ff;color:#fff;}
        .ai .content{background:#eaeaea;color:#333;}
        .inputArea{display:flex;gap:10px;}
        #txt{flex:1;padding:12px;border-radius:8px;border:1px solid #ccc;font-size:16px;}
        #btn{width:100px;background:#0088ff;color:#fff;border:none;border-radius:8px;font-size:16px;cursor:pointer;}
    </style>
</head>
<body>
    <div id="chatBox"></div>
    <div class="inputArea">
        <input type="text" id="txt" placeholder="输入问题...">
        <button id="btn">发送</button>
    </div>

    <script>
        // 👉 这里改成你自己的 Cloudflare Worker 地址
        const WORKER_URL = "https://你的Worker地址.workers.dev";

        const chatBox = document.getElementById('chatBox');
        const txt = document.getElementById('txt');
        const btn = document.getElementById('btn');

        btn.onclick = sendMsg;
        txt.addEventListener('keydown',e=>e.key==='Enter'&&sendMsg());

        async function sendMsg(){
            let text = txt.value.trim();
            if(!text)return;
            addMsg('user',text);
            txt.value = '';

            let res = await fetch(WORKER_URL,{
                method:'POST',
                headers:{'Content-Type':'application/json'},
                body:JSON.stringify({text:text})
            });

            let data = await res.json();
            let reply = data.candidates[0].content.parts[0].text;
            addMsg('ai',reply);
        }

        function addMsg(role,text){
            let div = document.createElement('div');
            div.className = 'item '+role;
            div.innerHTML = `<div class="content">${text}</div>`;
            chatBox.appendChild(div);
            chatBox.scrollTop = chatBox.scrollHeight;
        }
    </script>
</body>
</html>
