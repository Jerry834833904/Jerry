<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Jerry AI</title>

<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js">
document.addEventListener("keydown",event=>{
  if(event.key==="Escape" && isMessageSelectionMode)cancelMessageSelection();
});

</script>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/highlight.js@11.9.0/styles/github-dark.min.css">
<script src="https://cdn.jsdelivr.net/npm/highlight.js@11.9.0/lib/highlight.min.js"></script>

<style>
*{box-sizing:border-box}
html,body{margin:0;width:100%;overflow-x:hidden;background:#fff;color:#111;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Arial}
button,select,textarea,input{font:inherit}
.app{height:100vh;display:flex;overflow:hidden;max-width:100vw}
.sidebar{width:260px;background:#f7f7f8;border-right:1px solid #ddd;padding:12px;display:flex;flex-direction:column}
.brand{font-size:20px;font-weight:700;margin-bottom:12px;color:#111}
.new-chat{background:#fff;color:#111;border:1px solid #ddd;border-radius:12px;padding:12px;cursor:pointer;margin-bottom:12px}
.chat-list{flex:1;overflow-y:auto}
.chat-item{padding:10px;border-radius:10px;color:#333;cursor:pointer;font-size:14px;margin-bottom:6px;display:flex;align-items:center;justify-content:space-between;gap:8px}
.chat-item:hover,.chat-item.active{background:#ececf1}
.chat-title{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.delete-chat{border:none;background:transparent;color:#999;font-size:14px;cursor:pointer;padding:4px}
.delete-chat:hover{color:#e11d48}
.main{flex:1;display:flex;flex-direction:column;height:100vh;background:#fff;max-width:100vw;overflow-x:hidden}
.header{height:60px;border-bottom:1px solid #ddd;display:flex;align-items:center;justify-content:center;padding:0 16px;background:#fff;flex-shrink:0;position:relative}
.menu-btn{display:none;background:none;border:none;color:#111;font-size:22px;position:absolute;left:16px;top:50%;transform:translateY(-50%)}
.header-center{display:flex;align-items:center;justify-content:center;gap:8px;color:#111;min-width:0;position:absolute;left:50%;transform:translateX(-50%)}
.header-center .logo-text{font-size:20px;white-space:nowrap;font-weight:650}
select{background:#fff;color:#111;border:1px solid #ddd;border-radius:10px;padding:7px 9px;max-width:230px}
.header-spacer{display:none}
.chat{flex:1;overflow-y:auto;overflow-x:hidden;padding:24px 16px 225px;background:#fff;max-width:100vw}
.welcome{text-align:center;margin-top:14vh;color:#333}
.welcome h1{font-size:34px;color:#111;margin-bottom:10px}
.welcome p{line-height:1.8}
.mode-hints{display:flex;justify-content:center;gap:8px;flex-wrap:wrap;margin-top:20px}
.mode-hint{border:1px solid #ddd;background:#fff;border-radius:999px;padding:8px 13px;cursor:pointer;color:#333}
.mode-hint:hover{background:#f5f5f5}
.message{width:100%;max-width:850px;margin:24px auto;display:flex}
.ai{justify-content:center}
.user{justify-content:flex-end}
.content{max-width:min(720px,100%);overflow-wrap:break-word;word-break:break-word}
.ai .content{width:min(720px,100%)}
.user .content{max-width:min(78%,620px)}
.bubble{max-width:100%;white-space:normal;line-height:1.75;font-size:16px;color:#111;overflow-wrap:break-word;word-break:break-word}
.ai .bubble{padding:4px 2px}
.user .bubble{background:#f4f4f4;padding:12px 16px;border-radius:18px;white-space:pre-wrap}
.msg-img{max-width:min(520px,72vw);max-height:620px;height:auto;border-radius:14px;margin-top:10px;display:block;object-fit:contain;border:1px solid #eee;cursor:zoom-in}
.msg-video{width:min(620px,75vw);max-height:620px;border-radius:14px;margin-top:10px;display:block;background:#000;border:1px solid #eee}
.status-card{margin-top:10px;border:1px solid #ddd;background:#fafafa;border-radius:14px;padding:12px 14px;min-width:min(520px,70vw)}
.status-line{display:flex;align-items:center;gap:9px;color:#444}
.spinner{width:16px;height:16px;border:2px solid #ddd;border-top-color:#111;border-radius:50%;animation:spin .9s linear infinite;flex-shrink:0}
@keyframes spin{to{transform:rotate(360deg)}}
.actions{display:flex;gap:12px;margin-top:7px;flex-wrap:wrap}
.action-btn{background:none;border:none;color:#666;font-size:13px;cursor:pointer;padding:0}
.action-btn:hover{color:#111}
.message-menu-mask{position:fixed;inset:0;background:rgba(0,0,0,.18);z-index:120;display:none;align-items:flex-end;justify-content:center;padding:14px}
.message-menu-mask.show{display:flex}
.message-menu{width:min(440px,100%);background:#fff;border-radius:20px;padding:8px;box-shadow:0 18px 60px rgba(0,0,0,.2)}
.message-menu button{width:100%;border:0;background:transparent;border-radius:13px;padding:13px 14px;text-align:left;font-size:16px;cursor:pointer;color:#222}
.message-menu button:hover{background:#f4f4f4}
.message-menu .danger{color:#c62828}
.message-menu .cancel{margin-top:4px;background:#f4f4f4;text-align:center}
.message-select-toolbar{position:fixed;left:50%;bottom:22px;transform:translateX(-50%);z-index:125;display:none;align-items:center;gap:10px;width:min(620px,calc(100% - 24px));padding:10px 12px;background:rgba(20,20,20,.96);color:#fff;border-radius:18px;box-shadow:0 12px 40px rgba(0,0,0,.3)}
.message-select-toolbar.show{display:flex}
.message-select-count{flex:1;font-size:14px;padding-left:4px}
.message-select-btn{border:0;border-radius:12px;padding:9px 13px;background:#333;color:#fff;cursor:pointer;white-space:nowrap}
.message-select-btn.danger{background:#d92d20}
.message-select-btn.cancel{background:#555}
.message.selecting{cursor:pointer}
.message.selected .content{position:relative}
.message.selected .content::before{content:"✓";position:absolute;left:-34px;top:8px;width:24px;height:24px;border-radius:50%;display:flex;align-items:center;justify-content:center;background:#111;color:#fff;font-size:14px;font-weight:700}
.user.message.selected .content::before{left:auto;right:-34px}
.message.selected .bubble{outline:2px solid #111;outline-offset:4px;border-radius:14px}
@media(max-width:760px){
  .message-select-toolbar{bottom:92px}
  .message.selected .content::before{left:0;top:-18px}
  .user.message.selected .content::before{left:auto;right:0}
}
.long-press-tip{font-size:12px;color:#999;margin-top:6px}
.input-area{position:fixed;left:260px;right:0;bottom:0;background:linear-gradient(transparent,#fff 17%);padding:30px 16px 18px;max-width:100vw;overflow-x:hidden}
.mode-settings{max-width:850px;margin:0 auto 9px;display:flex;align-items:center;gap:8px;flex-wrap:wrap;background:#fff}
.attachment-mode-switch{max-width:850px;margin:0 auto 9px;display:none;align-items:center;gap:8px;flex-wrap:wrap}.attachment-mode-switch.show{display:flex}.attachment-mode-label{font-size:13px;color:#777}.attachment-mode-tabs{display:flex;border:1px solid #ddd;border-radius:12px;padding:3px;background:#f7f7f8}.attachment-mode-tab{border:0;background:transparent;border-radius:9px;padding:7px 13px;font-size:13px;cursor:pointer;color:#555}.attachment-mode-tab.active{background:#111;color:#fff}.setting-divider{width:1px;height:24px;background:#ddd;margin:0 2px}
.setting-group{display:none;gap:8px;align-items:center;flex-wrap:wrap;width:100%}
.setting-group.show{display:flex}
.setting-label{font-size:12px;color:#777}
.small-select{padding:6px 8px;font-size:13px;max-width:190px}
.toggle-label{display:flex;align-items:center;gap:5px;font-size:13px;color:#555;border:1px solid #ddd;border-radius:10px;padding:6px 9px;background:#fff}
.small-btn{border:1px solid #ddd;background:#fff;border-radius:10px;padding:6px 9px;font-size:13px;color:#444;cursor:pointer}
.small-btn:hover{background:#f5f5f5}
.reference-panel{max-width:850px;margin:0 auto 10px;display:none;background:#fff;border:1px solid #ddd;border-radius:14px;padding:11px}
.reference-panel.show{display:block}
.reference-title{display:flex;justify-content:space-between;align-items:center;gap:10px;margin-bottom:8px;font-size:13px;font-weight:650}
.reference-tip{font-size:12px;color:#777;font-weight:400}
.reference-grid{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:8px}
.reference-field label{display:block;font-size:12px;color:#666;margin:0 0 5px}
.reference-field textarea{width:100%;min-height:62px;max-height:110px;border:1px solid #ddd;border-radius:10px;padding:8px;font-size:12px;resize:vertical;outline:none}
.media-preview{max-width:850px;margin:0 auto 10px;display:none;gap:7px;flex-wrap:wrap;background:#fff;border:1px solid #ddd;border-radius:14px;padding:8px}
.media-preview.show{display:flex}
.media-chip{display:flex;align-items:center;gap:6px;max-width:260px;background:#f5f5f5;border:1px solid #e3e3e3;border-radius:999px;padding:6px 8px 6px 10px;font-size:12px}
.media-chip-name{overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.media-chip button{border:none;background:transparent;color:#777;cursor:pointer;padding:0 2px;font-size:14px}
.media-chip button:hover{color:#e11d48}
.preview{max-width:850px;margin:0 auto 10px;display:none;align-items:center;gap:10px;background:#fff;border:1px solid #ddd;border-radius:14px;padding:8px}
.preview img{width:56px;height:56px;object-fit:cover;border-radius:10px}
.preview .preview-info{min-width:0;flex:1}
.preview .preview-name{font-size:14px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.preview .preview-role{font-size:12px;color:#777;margin-top:3px}
.preview button{margin-left:auto;background:#f0f0f0;color:#111;border:none;border-radius:8px;padding:6px 10px;cursor:pointer}
.input-box{width:100%;max-width:850px;margin:auto;background:#fff;border:1px solid #ddd;border-radius:28px;display:flex;align-items:flex-end;padding:9px;box-shadow:0 2px 10px rgba(0,0,0,.06)}
textarea{flex:1;resize:none;max-height:160px;min-height:28px;min-width:0;background:transparent;border:none;outline:none;color:#111;font-size:16px;padding:8px}
.icon-btn{width:38px;height:38px;border:none;border-radius:50%;margin:0 3px;background:#f0f0f0;color:#111;font-size:17px;cursor:pointer;flex-shrink:0}
.icon-btn:disabled{opacity:.45;cursor:not-allowed}
.send-btn{background:#111;color:#fff}
#imageInput,#mediaInput{display:none}
.note{text-align:center;font-size:12px;color:#777;margin-top:8px}
.voice-settings{display:none}
.voice-panel{max-width:850px;margin:auto;background:#fff;border:1px solid #ddd;border-radius:28px;display:none;align-items:center;padding:9px 12px;gap:12px;box-shadow:0 2px 10px rgba(0,0,0,.06)}
.voice-text{flex:1;color:#333;font-size:15px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.wave{flex:1;height:28px;display:flex;align-items:center;gap:3px}
.wave span{width:3px;background:#555;border-radius:3px;animation:wave 1s infinite ease-in-out}
.wave span:nth-child(1){height:8px;animation-delay:.1s}.wave span:nth-child(2){height:16px;animation-delay:.2s}.wave span:nth-child(3){height:24px;animation-delay:.3s}.wave span:nth-child(4){height:14px;animation-delay:.4s}.wave span:nth-child(5){height:20px;animation-delay:.5s}.wave span:nth-child(6){height:10px;animation-delay:.6s}.wave span:nth-child(7){height:22px;animation-delay:.7s}.wave span:nth-child(8){height:12px;animation-delay:.8s}
@keyframes wave{0%,100%{transform:scaleY(.6);opacity:.5}50%{transform:scaleY(1.3);opacity:1}}
.voice-action{width:36px;height:36px;border-radius:50%;border:none;font-size:18px;cursor:pointer;flex-shrink:0}.cancel-btn{background:#f0f0f0;color:#111}.ok-btn{background:#111;color:#fff}
.bubble pre{background:#1e1e1e;color:#fff;padding:14px;border-radius:12px;overflow-x:auto;font-size:14px;max-width:100%}.bubble code{background:#1e1e1e;color:#fff;padding:2px 5px;border-radius:5px;font-family:monospace}.bubble pre code{padding:0;background:transparent}.bubble p{margin:0 0 10px}.bubble ul,.bubble ol{padding-left:22px}
.error-text{color:#b42318}


/* 媒体选择与全屏预览 */
.sheet-mask{position:fixed;inset:0;background:rgba(0,0,0,.28);z-index:80;display:none;align-items:flex-end;justify-content:center;padding:16px}
.sheet-mask.show{display:flex}
.upload-sheet{width:min(520px,100%);background:#fff;border-radius:22px;padding:14px;box-shadow:0 18px 60px rgba(0,0,0,.18)}
.upload-sheet-title{text-align:center;font-size:13px;color:#777;margin:2px 0 12px}
.upload-sheet-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.upload-choice{border:1px solid #e6e6e6;background:#fafafa;border-radius:16px;padding:16px 10px;cursor:pointer;text-align:center}
.upload-choice strong{display:block;font-size:16px;margin-top:7px}.upload-choice span{font-size:12px;color:#777}
.upload-sheet-cancel{width:100%;margin-top:10px;border:0;background:#f2f2f2;border-radius:14px;padding:12px;cursor:pointer}
.media-viewer{position:fixed;inset:0;background:#000;z-index:100;display:none;flex-direction:column;color:#fff}
.media-viewer.show{display:flex}
.viewer-top{height:64px;display:flex;align-items:center;justify-content:space-between;padding:8px 14px;gap:10px;flex-shrink:0}
.viewer-close,.viewer-save{border:0;background:rgba(255,255,255,.13);color:#fff;border-radius:999px;padding:10px 14px;cursor:pointer}
.viewer-mode{display:flex;background:rgba(255,255,255,.13);border-radius:999px;padding:3px;gap:2px}
.viewer-mode button{border:0;background:transparent;color:#ddd;border-radius:999px;padding:8px 15px;cursor:pointer}
.viewer-mode button.active{background:#fff;color:#111}
.viewer-body{flex:1;min-height:0;display:flex;align-items:center;justify-content:center;overflow:hidden;padding:10px}
.viewer-body img,.viewer-body video{max-width:100%;max-height:100%;object-fit:contain;-webkit-user-select:none;user-select:none}
.viewer-hint{text-align:center;font-size:12px;color:#bbb;padding:8px 12px 16px;flex-shrink:0}
.viewer-generate{display:flex;gap:8px;justify-content:center;padding:0 12px 14px;flex-shrink:0}
.viewer-generate button{border:1px solid rgba(255,255,255,.25);background:rgba(255,255,255,.12);color:#fff;border-radius:999px;padding:9px 15px;cursor:pointer}

@media(max-width:760px){
.sidebar{position:fixed;left:-270px;top:0;bottom:0;z-index:20;transition:.25s}.sidebar.show{left:0}.menu-btn{display:block;left:10px}.header{padding:0 10px}.header-center{gap:5px}.header-center .logo-text{display:inline;font-size:20px}.header-center select{max-width:128px;font-size:12px;padding:6px}.header-spacer{display:none}.chat{padding:16px 12px 245px}.message{max-width:100%}.content{max-width:100%}.ai .content{width:100%;padding:0 10px}.user .content{max-width:82%}.input-area{left:0;padding:26px 12px 14px}.msg-img{max-width:74vw}.msg-video{width:76vw}.status-card{min-width:70vw}.mode-settings{gap:5px}.small-select{font-size:12px;max-width:150px}.toggle-label{font-size:12px;padding:5px 7px}.reference-grid{grid-template-columns:1fr}.reference-panel{max-height:245px;overflow:auto}
}

.quick-tools{max-width:850px;margin:0 auto 8px;display:flex;gap:8px;overflow-x:auto;padding:2px 1px;scrollbar-width:none}
.quick-tools::-webkit-scrollbar{display:none}
.quick-tool{border:1px solid #ddd;background:#fff;color:#222;border-radius:14px;padding:8px 13px;font-size:14px;white-space:nowrap;cursor:pointer;display:flex;align-items:center;gap:6px}
.quick-tool.active{background:#111;color:#fff;border-color:#111}
.quick-tool:active{transform:scale(.98)}

.model-switch{position:relative;display:flex;align-items:center;justify-content:center}
.model-switch-btn{border:0;background:transparent;color:#111;font-weight:650;font-size:20px;padding:8px 10px;border-radius:12px;cursor:pointer;display:flex;align-items:center;gap:5px}
.model-switch-btn:hover{background:#f5f5f5}
.model-switch-arrow{font-size:12px;color:#666;transition:transform .2s}
.model-switch.open .model-switch-arrow{transform:rotate(180deg)}
.model-menu{position:absolute;top:48px;left:50%;transform:translateX(-50%);width:190px;background:#fff;border:1px solid #e2e2e2;border-radius:16px;box-shadow:0 14px 44px rgba(0,0,0,.14);padding:7px;display:none;z-index:70}
.model-switch.open .model-menu{display:block}
.model-menu-item{width:100%;border:0;background:transparent;border-radius:11px;padding:11px 12px;display:flex;align-items:center;justify-content:space-between;gap:10px;cursor:pointer;color:#222;text-align:left}
.model-menu-item:hover{background:#f4f4f4}
.model-menu-item.active{background:#f1f1f1;font-weight:650}
.model-check{width:18px;text-align:center}
@media(max-width:760px){.model-switch-btn{font-size:20px}.model-menu{top:46px}}
</style>
</head>

<body>
<div class="app">
  <div id="sidebar" class="sidebar">
    <div class="brand">Jerry AI</div>
    <button class="new-chat" onclick="newChat()">＋ 新建聊天</button>
    <div id="chatList" class="chat-list"></div>
  </div>

  <div class="main">
    <div class="header">
      <button class="menu-btn" onclick="toggleSidebar()">☰</button>

      <div class="header-center">
        <div id="chatModelSwitch" class="model-switch">
          <button id="chatModelButton" type="button" class="model-switch-btn" onclick="toggleChatModelMenu(event)" aria-haspopup="true" aria-expanded="false">
            <span id="chatModelLabel">GPT6.0</span><span class="model-switch-arrow">⌄</span>
          </button>
          <div id="chatModelMenu" class="model-menu" role="menu">
            <button type="button" class="model-menu-item active" data-chat-model="gpt6" onclick="selectChatModel('gpt6')">
              <span>GPT6.0</span><span class="model-check">✓</span>
            </button>
            <button type="button" class="model-menu-item" data-chat-model="doubao" onclick="selectChatModel('doubao')">
              <span>Doubao Pro</span><span class="model-check"></span>
            </button>
          </div>
        </div>
        <select id="taskMode" aria-label="功能模式" hidden>
          <option value="chat">AI 聊天</option>
          <option value="image">图片生成</option>
          <option value="video">视频生成</option>
        </select>
        <select id="modelMode" aria-label="模型" hidden></select>
      </div>

      <div class="header-spacer"></div>
    </div>

    <div id="chat" class="chat">
      <div id="welcome" class="welcome">
        <h1>Jerry AI</h1>
        <p id="welcomeText" hidden></p>
        <div class="mode-hints">
          <span class="mode-hint">直接输入文字，或上传图片、视频，Jerry AI 会自动选择功能</span>
        </div>
      </div>
    </div>

    <div class="input-area">
      <div class="voice-settings">
        <input id="voiceRate" type="range" min="0.7" max="1.3" step="0.05" value="0.95">
        <input id="autoSpeak" type="checkbox">
      </div>

      <div id="attachmentModeSwitch" class="attachment-mode-switch">
        <span class="attachment-mode-label">生成方式</span>
        <div class="attachment-mode-tabs">
          <button id="attachmentImageMode" type="button" class="attachment-mode-tab" onclick="chooseAttachmentMode('image')">🖼️ 生成图片</button>
          <button id="attachmentVideoMode" type="button" class="attachment-mode-tab" onclick="chooseAttachmentMode('video')">🎬 生成视频</button>
        </div>
      </div>

      <div class="mode-settings">
        <div id="imageSettings" class="setting-group">
          <span class="setting-label">图片设置</span>
          <select id="imageResolution" class="small-select" title="图片分辨率">
            <option value="1080p">高清 1080P</option>
            <option value="2K" selected>超清 2K</option>
            <option value="4K">极清 4K</option>
          </select>
          <select id="imageRatio" class="small-select" title="图片比例">
            <option value="auto">自适应比例</option>
            <option value="1:1">1:1 方形</option>
            <option value="16:9">16:9 横图</option>
            <option value="9:16">9:16 竖图</option>
            <option value="4:3">4:3 横图</option>
            <option value="3:4">3:4 竖图</option>
          </select>
          <label class="toggle-label"><input id="imageWatermark" type="checkbox"> 水印</label>
        </div>

        <div id="videoSettings" class="setting-group">
          <span class="setting-label">视频设置</span>
          <select id="videoResolution" class="small-select" title="视频质量">
            <option value="480p">流畅 480P</option>
            <option value="720p" selected>高清 720P</option>
            <option value="1080p">全高清 1080P</option>
            <option value="4k">超清 4K</option>
          </select>
          <select id="videoRatio" class="small-select">
            <option value="16:9">16:9 横屏</option>
            <option value="9:16">9:16 竖屏</option>
            <option value="1:1">1:1 方形</option>
            <option value="4:3">4:3</option>
            <option value="3:4">3:4</option>
            <option value="21:9">21:9 超宽屏</option>
          </select>
          <select id="videoDuration" class="small-select">
            <option value="4">4 秒</option>
            <option value="5">5 秒</option>
            <option value="8">8 秒</option>
            <option value="10">10 秒</option>
            <option value="11">11 秒</option>
            <option value="15">15 秒</option>
          </select>
          <label class="toggle-label"><input id="videoAudio" type="checkbox" checked> 生成音频</label>
          <label class="toggle-label"><input id="videoWatermark" type="checkbox"> 水印</label>
          <button type="button" class="small-btn" onclick="toggleReferencePanel()">🔗 素材 URL</button>
        </div>
      </div>

function resolveImageSize(){
  const resolution=document.getElementById("imageResolution")?.value || "2K";
  const ratio=document.getElementById("imageRatio")?.value || "auto";

  // 后端兼容明确像素尺寸；自适应模式直接传分辨率档位。
  if(ratio==="auto")return resolution;

  const map={
    "1080p":{
      "1:1":"1024x1024","16:9":"1424x800","9:16":"800x1424",
      "4:3":"1152x864","3:4":"864x1152"
    },
    "2K":{
      "1:1":"2048x2048","16:9":"2560x1440","9:16":"1440x2560",
      "4:3":"2304x1728","3:4":"1728x2304"
    },
    "4K":{
      "1:1":"4096x4096","16:9":"4096x2304","9:16":"2304x4096",
      "4:3":"4096x3072","3:4":"3072x4096"
    }
  };
  return map[resolution]?.[ratio] || resolution;
}

function detectAutoIntent(text=input.value.trim()){
  const raw=String(text || "");

  const hasAnyFile=hasImage || hasVideoFile || hasAudioFile;

  const includesAny=(words)=>words.some(word=>compact.includes(String(word).toLowerCase().replace(/\s+/g,"")));
  const matchAny=(patterns)=>patterns.some(pattern=>pattern.test(value));

  // 视频生成、图生视频、视频续写：优先级最高。
  const videoGenerateWords=[
    "生成视频","做成视频","制作视频","变成视频","视频生成","文生视频","图生视频",
    "让它动起来","让图片动起来","让照片动起来","动起来","做成动画","生成动画",
    "拍成视频","做个短片","生成短片","做个视频","来个视频","视频化","转成视频",
    "让她走路","让他走路","让她跳舞","让他跳舞","让她说话","让他开口",
    "眨眼","微笑","挥手","转身","奔跑","飞起来","镜头推进","镜头拉远","运镜",
    "延长视频","续写视频","扩展视频","补帧","首尾帧","参考视频","视频同款",
    "createvideo","generatevideo","makeavideo","animate","imagetovideo","texttovideo"
  ];
  const videoGeneratePatterns=[
    /(让|使).{0,10}(动|走|跑|跳|笑|哭|说话|开口|眨眼|挥手|转身|飞)/i,
    /(图片|照片|人物|她|他|它).{0,10}(动起来|做成视频|生成视频|变成动画)/i,
    /(生成|制作|做|来).{0,6}(一段|一个|个)?(短视频|视频|动画|短片)/i
  ];

  // 图片编辑/重绘，覆盖颜色、背景、人物、文字、风格、修图等常见自然表达。
  const imageEditWords=[
    "变成","改成","换成","修改","编辑","重绘","重新画","重新生成","调整",
    "换背景","改背景","去背景","去掉背景","删除背景","背景透明","抠图","透明底",
    "去掉","删除","移除","擦除","消除","加上","添加","放一个","补上","替换",
    "变红","变红色","红一点","改红色","换红色","变蓝","变蓝色","改蓝色","变黄","变黄色",
    "改颜色","换颜色","调颜色","换发色","改发色","头发变","衣服变","眼睛变","皮肤变",
    "换衣服","换装","换发型","加眼镜","去眼镜","加帽子","去水印","去文字","改文字",
    "美化","修图","磨皮","瘦脸","美白","祛痘","高清","增强清晰度","放大","扩图","补全",
    "动漫","二次元","卡通","吉卜力","油画","水彩","素描","赛博朋克","写实","q版","3d",
    "海报","证件照","头像","壁纸","电商图","主图","换季节","换天气","白天变夜晚","夜景",
    "editimage","change","replace","remove","add","recolor","restyle","inpaint","outpaint"
  ];
  const imageEditPatterns=[
    /(把|将).{0,16}(变成|改成|换成|修改为|调整为|做成)/i,
    /(头发|发色|衣服|背景|天空|眼睛|皮肤|车|花|墙|颜色).{0,8}(红|黄|蓝|绿|黑|白|紫|粉|橙|灰|透明|亮|暗)/i,
    /(改|换|变|调).{0,8}(颜色|背景|发型|发色|衣服|风格|文字|尺寸|比例)/i,
    /(删除|去掉|移除|擦除|加上|添加|替换).{0,16}/i,
    /(修复|美化|增强|高清|放大|扩展|补全|抠图).{0,12}/i
  ];

  // 图片理解/OCR/问答。只有明确询问图片内容时才进入视觉聊天。
  const visionWords=[
    "这是什么","是什么东西","图片里有什么","图里有什么","照片里有什么","这张图","这张照片",
    "帮我看看","看一下","分析图片","识别图片","描述图片","介绍图片","解释图片",
    "这是谁","这个人是谁","什么花","什么动物","什么车","什么牌子","什么型号","哪里",
    "读一下","读出来","提取文字","识别文字","ocr","翻译图片","图片翻译","看得清吗",
    "判断真假","是不是","有没有","多少个","数一下","什么意思","什么问题","哪里坏了",
    "describeimage","analyzeimage","whatisthis","readthetext","ocr"
  ];
  const visionPatterns=[
    /^(这|那|图里|图片里|照片里).{0,12}(是|有|在|叫什么|什么意思|怎么了)/i,
    /(识别|分析|描述|解释|判断|检查|看看).{0,8}(图|图片|照片|内容|文字|物体|人物)/i,
    /(图|图片|照片).{0,8}(是什么|有什么|是谁|在哪里|什么意思)/i
  ];

  // 视频理解；有视频时，只有明确“分析/总结/字幕”等才进入理解提示。
  const videoUnderstandWords=[
    "分析视频","看看视频","视频内容","总结视频","识别视频","视频里是什么","视频里有什么",
    "讲了什么","发生了什么","提取字幕","识别字幕","翻译视频","视频翻译","提取文案",

  ];

    /(生成|画|绘制|设计|制作|做|来|出).{0,6}(一张|一个|张|个)?(图片|图|海报|头像|壁纸|封面|插画|logo)/i

  // 附件优先路由，避免上传图片/视频后误入普通聊天。
  if(hasVideoFile || hasAudioFile){
    if(isVideoUnderstand && !isVideoGenerate)return "video_analysis";

  }

  if(hasImage){
    if(isVideoGenerate)return "video";
    if(isImageEdit)return "image";
    if(isVision)return "chat";
    // 上传图片后只要写了处理要求，默认按图片编辑，而不是普通对话。
    if(compact.length>0)return "image";
    return "chat";
  }

  // 无附件时按明确意图判断。
  if(isVideoGenerate)return "video";
  if(isImageGenerate || isImageEdit)return "image";
  return "chat";
}
function previewAutoIntent(){
  const intent=forcedTaskMode || detectAutoIntent();
  if(intent==="image")taskMode.value="image";
  else if(intent==="video")taskMode.value="video";
  else taskMode.value="chat";
  updateModeUI();
}

function updateModeUI(){
  const mode=taskMode.value;
  quickImage?.classList.toggle("active",forcedTaskMode==="image");
  quickVideo?.classList.toggle("active",forcedTaskMode==="video");
  const options=MODEL_OPTIONS[mode] || MODEL_OPTIONS.chat;
  modelMode.innerHTML="";
  options.forEach(item=>{
    const option=document.createElement("option");
    option.value=item.value;
    option.textContent=item.label;
    modelMode.appendChild(option);
  });

  // 智能判断到图片或视频生成时，自动显示对应设置。
  imageSettings.classList.toggle("show",mode==="image");
  videoSettings.classList.toggle("show",mode==="video");

  const hasAttachment=Boolean(selectedImageBase64) || selectedVideoFiles.length>0;
  attachmentModeSwitch.classList.toggle("show",hasAttachment);
  attachmentImageMode.classList.toggle("active",mode==="image");
  attachmentVideoMode.classList.toggle("active",mode==="video");

  // 音频单独上传时不提供图片生成入口。
  const hasVisualAttachment=Boolean(selectedImageBase64) || selectedVideoFiles.some(file=>{
    const type=getFileMediaType(file);
    return type==="image" || type==="video";
  });
  attachmentImageMode.style.display=hasVisualAttachment?"":"none";

  preview.style.display=selectedImageBase64 ? "flex" : "none";
  mediaPreview.classList.toggle("show",selectedVideoFiles.length>0);
  if(mode!=="video")videoReferencePanel.classList.remove("show");
  sendButton.textContent=mode==="image"?"🎨":mode==="video"?"🎬":"➤";
  uploadButton.title="上传图片、视频或音频";

  if(mode==="image"){
    input.placeholder=selectedImageBase64 ? "描述要识别、修改或生成什么，例如“这是什么”或“变成红色”..." : "描述想生成的图片...";
    welcomeText.textContent="";
  }else if(mode==="video"){
    input.placeholder=(selectedImageBase64 || selectedVideoFiles.length) ? "描述照片或视频要如何动起来，例如“让鸭子跳舞”..." : "描述想生成的视频...";
    welcomeText.textContent="";
  }else{
    input.placeholder=selectedImageBase64 ? "询问这张图片，或说“把它做成视频/修改图片”..." : "发消息给 Jerry AI...";
    welcomeText.textContent="";
  }
  updatePreviewRole();
}

function updatePreviewRole(){
  const mode=taskMode.value;
  if(mode==="image")previewRole.textContent="将用于图片编辑或参考图生成";
  else if(mode==="video")previewRole.textContent="将作为首帧或参考素材生成视频";
  else previewRole.textContent="将用于图片理解";
}

function renderMarkdown(element,text){
  element.innerHTML=marked.parse(text || "");
  element.querySelectorAll("pre code").forEach(block=>hljs.highlightElement(block));
}

function typeWriter(element,text,speed=8){
  return new Promise(resolve=>{
    let i=0;
    element.textContent="";
    const timer=setInterval(()=>{
      element.textContent+=text.charAt(i);
      i++;
      chat.scrollTop=chat.scrollHeight;
      if(i>=text.length){
        clearInterval(timer);
        renderMarkdown(element,text);
        resolve();
      }
    },speed);
  });
}

function getCurrent(){return conversations.find(c=>c.id===currentId)}

function saveAll(){
  try{
    localStorage.setItem("jerry_conversations",JSON.stringify(conversations));
    localStorage.setItem("jerry_current_id",currentId);
  }catch(err){
    console.warn("本地记录保存失败，可能是图片数据超过浏览器容量：",err);
  }
}

function createConversation(){
  const id=Date.now().toString();
  conversations.unshift({id,title:"新聊天",messages:[]});
  currentId=id;
  saveAll();
}

function newChat(){
  cancelMessageSelection();
  createConversation();
  renderChatList();
  renderMessages();
  toggleSidebar(false);
}

function deleteConversation(id){
  if(!confirm("确定删除这个聊天记录吗？"))return;
  conversations=conversations.filter(c=>c.id!==id);
  if(conversations.length===0)createConversation();
  else if(currentId===id)currentId=conversations[0].id;
  saveAll();
  renderChatList();
  renderMessages();
}

function renderChatList(){
  chatList.innerHTML="";
  conversations.forEach(c=>{
    const div=document.createElement("div");
    div.className="chat-item"+(c.id===currentId?" active":"");

    const title=document.createElement("span");
    title.className="chat-title";
    title.textContent=c.title;
    title.onclick=()=>{
      cancelMessageSelection();
      currentId=c.id;
      saveAll();
      renderChatList();
      renderMessages();
      toggleSidebar(false);
    };

    const del=document.createElement("button");
    del.className="delete-chat";
    del.textContent="🗑️";
    del.title="删除";
    del.onclick=e=>{e.stopPropagation();deleteConversation(c.id)};

    div.appendChild(title);
    div.appendChild(del);
    chatList.appendChild(div);
  });
}

function bindMessageLongPress(element,message){
  let startX=0,startY=0;
  const isInteractive=target=>Boolean(target?.closest?.("img,video,button,a,input,textarea,select"));
  const cancel=()=>{
    if(messageLongPressTimer){clearTimeout(messageLongPressTimer);messageLongPressTimer=null;}
  };
  element.addEventListener("touchstart",event=>{
    if(isInteractive(event.target))return;
    const touch=event.touches?.[0];
    startX=touch?.clientX || 0;startY=touch?.clientY || 0;
    cancel();
    messageLongPressTimer=setTimeout(()=>{
      if(navigator.vibrate)navigator.vibrate(20);
      if(isMessageSelectionMode)toggleMessageSelection(message);
      else openMessageMenu(message);
    },520);
  },{passive:true});
  element.addEventListener("touchmove",event=>{
    const touch=event.touches?.[0];
    if(!touch)return;
    if(Math.abs(touch.clientX-startX)>10 || Math.abs(touch.clientY-startY)>10)cancel();
  },{passive:true});
  element.addEventListener("touchend",cancel,{passive:true});
  element.addEventListener("touchcancel",cancel,{passive:true});
  element.addEventListener("contextmenu",event=>{
    if(isInteractive(event.target))return;
    event.preventDefault();
    if(isMessageSelectionMode)toggleMessageSelection(message);
    else openMessageMenu(message);
  });
  element.addEventListener("click",event=>{
    if(!isMessageSelectionMode || isInteractive(event.target))return;
    event.preventDefault();
    event.stopPropagation();
    toggleMessageSelection(message);
  });
}

function openMessageMenu(message){
  selectedMenuMessage=message;
  document.getElementById("messageMenuMask")?.classList.add("show");
}

function closeMessageMenu(event){
  if(event && event.target!==event.currentTarget)return;
  document.getElementById("messageMenuMask")?.classList.remove("show");
  selectedMenuMessage=null;
}

function startMessageSelection(){
  const message=selectedMenuMessage;
  closeMessageMenu();
  isMessageSelectionMode=true;
  selectedMessages.clear();
  if(message)selectedMessages.add(message);
  refreshMessageSelectionUI();
}

function toggleMessageSelection(message){
  if(!isMessageSelectionMode || !message)return;
  if(selectedMessages.has(message))selectedMessages.delete(message);
  else selectedMessages.add(message);
  refreshMessageSelectionUI();
}

function refreshMessageSelectionUI(){
  const toolbar=document.getElementById("messageSelectToolbar");
  const count=document.getElementById("messageSelectCount");
  toolbar?.classList.toggle("show",isMessageSelectionMode);
  if(count)count.textContent=`已选择 ${selectedMessages.size} 条`;

  document.querySelectorAll(".message").forEach(element=>{
    const message=element.__messageRef;
    element.classList.toggle("selecting",isMessageSelectionMode);
    element.classList.toggle("selected",Boolean(message && selectedMessages.has(message)));
  });
}

function selectAllMessages(){
  const c=getCurrent();
  if(!c)return;
  selectedMessages.clear();
  c.messages.forEach(message=>selectedMessages.add(message));
  refreshMessageSelectionUI();
}

function cancelMessageSelection(){
  isMessageSelectionMode=false;
  selectedMessages.clear();
  refreshMessageSelectionUI();
}

function deleteSelectedMessages(){
  const c=getCurrent();
  if(!c || selectedMessages.size===0)return;

  const count=selectedMessages.size;
  if(!confirm(`确定删除选中的 ${count} 条消息吗？`))return;

  c.messages=c.messages.filter(message=>!selectedMessages.has(message));
  if(c.messages.length===0)c.title="新聊天";
  saveAll();
  renderChatList();
  cancelMessageSelection();
  renderMessages();
}


async function copySelectedMessage(){
  const message=selectedMenuMessage;
  if(!message)return closeMessageMenu();
  const text=String(message.content || "").trim();
  try{
    await navigator.clipboard.writeText(text);
  }catch{
    const temp=document.createElement("textarea");
    temp.value=text;temp.style.position="fixed";temp.style.opacity="0";
    document.body.appendChild(temp);temp.select();document.execCommand("copy");temp.remove();
  }
  closeMessageMenu();
}

function deleteSelectedMessage(){
  const message=selectedMenuMessage;
  const c=getCurrent();
  if(!message || !c)return closeMessageMenu();
  const index=c.messages.indexOf(message);
  if(index<0)return closeMessageMenu();
  c.messages.splice(index,1);
  if(c.messages.length===0)c.title="新聊天";
  saveAll();renderChatList();renderMessages();closeMessageMenu();
}

function renderMessages(){
  chat.innerHTML="";
  const c=getCurrent();
  if(!c || c.messages.length===0){
    chat.appendChild(welcome);
    welcome.style.display="block";
    return;
  }

  welcome.style.display="none";
  c.messages.forEach((message,index)=>{
    const rendered=addMessageToPage(message.role,message);
    if(message.role==="assistant" && message.mediaType==="video" && message.taskId && !message.video && !["failed","cancelled","expired"].includes(message.status)){
      pollVideoTask(message.taskId,rendered.bubble,c,index);
    }
  });
  refreshMessageSelectionUI();
}

function addMessageToPage(role,message={}){
  welcome.style.display="none";
  const msg=document.createElement("div");
  msg.className="message "+(role==="user"?"user":"ai");
  msg.__messageRef=message;
  if(isMessageSelectionMode)msg.classList.add("selecting");
  if(selectedMessages.has(message))msg.classList.add("selected");

  const content=document.createElement("div");
  content.className="content";

  const bubble=document.createElement("div");
  bubble.className="bubble";
  if(role==="assistant")renderMarkdown(bubble,message.content || "");
  else bubble.textContent=message.content || "";

  if(message.image){
    const img=document.createElement("img");
    img.className="msg-img";
    img.src=message.image;
    img.alt="生成或上传的图片";
    img.title="点击打开原图";
    img.onclick=()=>openMediaViewer(message.image,"image","jerry-ai-image.png");
    bubble.appendChild(img);
  }

  if(message.video){
    appendVideo(bubble,message.video);
  }else if(message.mediaType==="video" && message.taskId){
    appendVideoStatus(bubble,message.status || "queued",message.statusText || "视频任务已提交，正在生成...");
  }

  const actions=document.createElement("div");
  actions.className="actions";

  if(message.image){
    const open=document.createElement("button");
    open.className="action-btn";
    open.textContent="打开原图";
    open.onclick=()=>openMediaViewer(message.image,"image","jerry-ai-image.png");
    actions.appendChild(open);

    const down=document.createElement("button");
    down.className="action-btn";
    down.textContent="保存图片";
    down.onclick=()=>downloadFileDirect(message.image,"jerry-ai-image.png","image");
    actions.appendChild(down);
  }

  if(message.video){
    const downVideo=document.createElement("button");
    downVideo.className="action-btn";
    downVideo.textContent="下载视频";
    downVideo.onclick=()=>downloadFileDirect(message.video,"jerry-ai-video.mp4","video");
    actions.appendChild(downVideo);
  }

  if(role==="assistant" && !message.image && !message.video){
    const voice=document.createElement("button");
    voice.className="action-btn";
    voice.textContent="🔊 播放";
    voice.onclick=()=>speakText(message.content || bubble.innerText || "",voice);
    actions.appendChild(voice);
  }

  bindMessageLongPress(bubble,message);
  content.appendChild(bubble);
  if(actions.childElementCount)content.appendChild(actions);
  msg.appendChild(content);
  chat.appendChild(msg);
  chat.scrollTop=chat.scrollHeight;
  return {bubble,actions,msg};
}

function appendVideo(bubble,url){
  bubble.querySelectorAll(".status-card").forEach(el=>el.remove());
  if(bubble.querySelector("video"))return;
  const video=document.createElement("video");
  video.className="msg-video";
  video.src=url;
  video.controls=true;
  video.playsInline=true;
  video.preload="metadata";
  video.setAttribute("webkit-playsinline","");
  video.title="双击全屏打开，手机可长按保存";
  video.ondblclick=()=>openMediaViewer(url,"video","jerry-ai-video.mp4");
  bubble.appendChild(video);
}

function appendVideoStatus(bubble,status,text){
  bubble.querySelectorAll(".status-card").forEach(el=>el.remove());
  const card=document.createElement("div");
  card.className="status-card";
  const line=document.createElement("div");
  line.className="status-line";

  if(!["failed","cancelled","expired","succeeded"].includes(status)){
    const spinner=document.createElement("span");
    spinner.className="spinner";
    line.appendChild(spinner);
  }

  const span=document.createElement("span");
  span.textContent=text;
  if(["failed","cancelled","expired"].includes(status))span.className="error-text";
  line.appendChild(span);
  card.appendChild(line);
  bubble.appendChild(card);
}

async function handlePrimaryAction(){
  if(isSubmitting)return;
  const intent=forcedTaskMode || detectAutoIntent();

  if(intent==="video_analysis"){
    alert("当前后端还没有接入视频内容理解模型。你可以输入“生成视频”把上传的视频作为参考素材，或只上传图片进行识别。");
    return;
  }

  taskMode.value=intent;
  updateModeUI();
  if(intent==="image")return generateImage();
  if(intent==="video")return generateVideo();
  return sendMessage();
}

function setSubmitting(value){
  isSubmitting=value;
  sendButton.disabled=value;
  uploadButton.disabled=value;
}

async function sendMessage(){
  const text=input.value.trim();
  const image=selectedImageBase64;
  if(!text && !image)return;

  setSubmitting(true);
  const c=getCurrent();
  if(c.title==="新聊天")c.title=text?text.slice(0,18):"图片识别";

  const userMessage={role:"user",content:text || "帮我看看这张图片",image:image || null};
  c.messages.push(userMessage);
  addMessageToPage("user",userMessage);

  input.value="";
  input.style.height="auto";
  clearImage();
  selectedVideoFiles=[];
  renderMediaPreview();
  saveAll();
  renderChatList();

  const mode="auto";
  const thinkingText=currentChatModel==="doubao"?"Doubao Pro 正在思考...":"正在思考...";

  const aiMessage={role:"assistant",content:thinkingText};
  const {bubble:aiBubble}=addMessageToPage("assistant",aiMessage);

  try{
    const payload=image?{
      type:"image",
      chatModel:currentChatModel,
      model:currentChatModel,
      message:text || "请描述这张图片，并回答我的问题。",
      image
    }:{
      type:"text",
      chatModel:currentChatModel,
      model:currentChatModel,
      mode,
      messages:c.messages.filter(m=>!m.image && m.mediaType!=="video").slice(-20).map(m=>({
        role:m.role==="assistant"?"assistant":"user",
        content:m.content
      }))
    };

    const data=await postJson(CHAT_WORKER_URL,payload);
    const reply=data.reply || "没有收到回复";
    await typeWriter(aiBubble,reply);
    aiMessage.content=reply;
    c.messages.push(aiMessage);
    saveAll();

    if(document.getElementById("autoSpeak").checked)speakText(reply);
  }catch(err){
    renderMarkdown(aiBubble,"连接失败："+escapeMarkdown(err.message));
  }finally{
    setSubmitting(false);
  }
}

  };

  saveAll();

  }

async function generateVideo(){
  const prompt=input.value.trim();
  if(!prompt){
    alert("请先写视频提示词。");
    return;
  }
  if(!isMediaWorkerConfigured())return;

  const localFiles=[...selectedVideoFiles];
  let urlReferences=[];
  try{
    urlReferences=collectUrlReferences();
  }catch(err){
    alert(err.message);
    return;
  }
  const hasLocalImage=localFiles.some(file=>getFileMediaType(file)==="image");
  if(selectedImageBase64 && !hasLocalImage){
    urlReferences.unshift({type:"image",url:selectedImageBase64});
  }
  if(localFiles.length + urlReferences.length > 12){
    alert("参考素材总数最多 12 个，请减少后再提交。");
    return;
  }

  setSubmitting(true);
  const c=getCurrent();
  if(c.title==="新聊天")c.title="视频："+prompt.slice(0,14);

  const counts=countReferences(localFiles,urlReferences);
  const summary=[];
  if(counts.image)summary.push(`${counts.image}张图片`);
  if(counts.video)summary.push(`${counts.video}个视频`);
  if(counts.audio)summary.push(`${counts.audio}个音频`);

  const userMessage={
    role:"user",
    content:"生成视频："+prompt+(summary.length?`\n参考素材：${summary.join("、")}`:"")
  };
  c.messages.push(userMessage);
  addMessageToPage("user",userMessage);
  closeMediaViewer();
  closeMessageMenu();

  input.value="";
  input.style.height="auto";
  saveAll();
  renderChatList();

  const aiMessage={
    role:"assistant",
    content:"视频任务正在创建...",
    mediaType:"video",
    status:"creating",
    statusText:localFiles.length?"正在处理本地参考素材...":"正在创建视频任务..."
  };
  const aiIndex=c.messages.length;
  c.messages.push(aiMessage);
  const {bubble}=addMessageToPage("assistant",aiMessage);
  appendVideoStatus(bubble,"creating",aiMessage.statusText);
  saveAll();

  try{
    const uploadedReferences=[];
    for(let i=0;i<localFiles.length;i++){
      const file=localFiles[i];
      const mediaType=getFileMediaType(file);

      // 本地图片直接转成 Base64 传给 Seedance，不需要 R2。
      if(mediaType==="image"){
        aiMessage.statusText=`正在处理参考图片 ${i+1}/${localFiles.length}：${file.name}`;
        appendVideoStatus(bubble,"creating",aiMessage.statusText);
        const imageBase64=await compressImage(file);
        uploadedReferences.push({type:"image",url:imageBase64});
        continue;
      }

      // 本地视频和音频文件仍需先上传到 R2，生成公网 URL。
      aiMessage.statusText=`正在上传参考素材 ${i+1}/${localFiles.length}：${file.name}`;
      appendVideoStatus(bubble,"creating",aiMessage.statusText);
      const uploaded=await uploadReferenceFile(file);
      uploadedReferences.push({type:uploaded.type,url:uploaded.url});
    }

    const references=[...uploadedReferences,...urlReferences];
    aiMessage.statusText="素材已准备完成，正在创建视频任务...";
    appendVideoStatus(bubble,"creating",aiMessage.statusText);

    const data=await postJson(MEDIA_WORKER_URL,{
      type:"create_video",
      modelKey:"seedance_20",
      prompt,
      references,
      resolution:document.getElementById("videoResolution").value,
      ratio:document.getElementById("videoRatio").value,
      duration:Number(document.getElementById("videoDuration").value),
      generateAudio:document.getElementById("videoAudio").checked,
      watermark:document.getElementById("videoWatermark").checked
    });

    if(!data.taskId)throw new Error(data.error || "接口没有返回视频任务 ID");
    aiMessage.taskId=data.taskId;
    aiMessage.status=data.status || "queued";
    aiMessage.content="视频任务已提交。";
    aiMessage.statusText=`任务已提交，包含 ${data.referenceCount ?? references.length} 个参考素材，正在排队或生成中...`;
    saveAll();
    appendVideoStatus(bubble,aiMessage.status,aiMessage.statusText);
    clearVideoReferences();
    clearImage();
    closeMediaViewer();
    pollVideoTask(data.taskId,bubble,c,aiIndex);
  }catch(err){
    aiMessage.status="failed";
    aiMessage.content="视频任务创建失败："+err.message;
    aiMessage.statusText=aiMessage.content;
    saveAll();
    appendVideoStatus(bubble,"failed",aiMessage.content);
  }finally{
    setSubmitting(false);
  }
}

function collectUrlReferences(){
  return [
    ...parseReferenceUrls(videoImageUrls.value,"image"),
    ...parseReferenceUrls(videoVideoUrls.value,"video"),
    ...parseReferenceUrls(videoAudioUrls.value,"audio")
  ];
}

function parseReferenceUrls(text,type){
  return String(text || "").split(/\r?\n/).map(item=>item.trim()).filter(Boolean).map(url=>{
    let parsed;
    try{parsed=new URL(url)}catch{throw new Error(`无效的${referenceTypeLabel(type)} URL：${url}`)}
    if(!["http:","https:"].includes(parsed.protocol))throw new Error(`${referenceTypeLabel(type)} URL 只支持 http 或 https`);
    return {type,url};
  });
}

function countReferences(files,references){
  const count={image:0,video:0,audio:0};
  references.forEach(item=>{if(count[item.type]!==undefined)count[item.type]++});
  files.forEach(file=>{const type=getFileMediaType(file);if(type)count[type]++});
  return count;
}

async function uploadReferenceFile(file){
  const form=new FormData();
  form.append("file",file,file.name);
  const url=MEDIA_WORKER_URL.replace(/\/+$/,"")+"/upload";
  const res=await fetch(url,{method:"POST",body:form});
  let data={};
  try{data=await res.json()}catch{throw new Error(`上传接口返回了非 JSON 内容，HTTP ${res.status}`)}
  if(!res.ok || data.ok===false)throw new Error(data.error || `素材上传失败，HTTP ${res.status}`);
  if(!data.url || !data.type)throw new Error("素材上传成功，但没有返回可用 URL");
  return data;
}

async function pollVideoTask(taskId,bubble,conversation,messageIndex){
  if(activeVideoPolls.has(taskId) || !taskId)return;
  activeVideoPolls.add(taskId);

  const maxAttempts=180;
  let attempt=0;

  try{
    while(attempt<maxAttempts){
      attempt++;
      if(!document.body.contains(bubble))break;

      const data=await postJson(MEDIA_WORKER_URL,{type:"video_status",taskId});
      const status=(data.status || "unknown").toLowerCase();
      const message=conversation.messages[messageIndex];
      if(!message || message.taskId!==taskId)break;

      message.status=status;
      message.statusText=videoStatusText(status,data.error,attempt);

      if(status==="succeeded" && data.video){
        message.video=data.video;
        message.content="视频生成完成：";
        message.statusText="视频生成完成";
        saveAll();
        bubble.innerHTML="视频生成完成：";
        appendVideo(bubble,data.video);
        renderMessages();
        break;
      }

      if(["failed","cancelled","expired"].includes(status)){
        message.content="视频生成失败："+(data.error || status);
        message.statusText=message.content;
        saveAll();
        appendVideoStatus(bubble,status,message.statusText);
        break;
      }

      saveAll();
      appendVideoStatus(bubble,status,message.statusText);
      await sleep(5000);
    }
  }catch(err){
    const message=conversation.messages[messageIndex];
    if(message){
      message.statusText="查询视频状态失败，稍后重新打开该聊天会继续查询："+err.message;
      saveAll();
      appendVideoStatus(bubble,"running",message.statusText);
    }
  }finally{
    activeVideoPolls.delete(taskId);
  }
}

function videoStatusText(status,error,attempt){
  if(status==="queued")return `视频正在排队（第 ${attempt} 次查询）...`;
  if(status==="running")return `视频正在生成（第 ${attempt} 次查询）...`;
  if(status==="succeeded")return "视频生成完成";
  if(status==="failed")return "视频生成失败："+(error || "未知错误");
  if(status==="cancelled")return "视频任务已取消";
  if(status==="expired")return "视频任务已过期";
  return `视频任务状态：${status}（第 ${attempt} 次查询）`;
}

async function postJson(url,payload){
  const res=await fetch(url,{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify(payload)
  });

  let data={};
  try{data=await res.json()}catch{throw new Error(`服务器返回了非 JSON 内容，HTTP ${res.status}`)}
  if(!res.ok || data.ok===false)throw new Error(data.error || data.message || `请求失败，HTTP ${res.status}`);
  return data;
}

function isMediaWorkerConfigured(){
  if(WORKER_URL.includes("你的统一worker")){
    alert("请先部署统一 Worker，并在 HTML 顶部填写 WORKER_URL。\n\n注意：Ark API Key 只能放在 Worker 的环境变量中。");

  return true;
}

function getFileMediaType(file){
  const mime=String(file?.type || "").toLowerCase();
  const name=String(file?.name || "").toLowerCase();
  if(mime.startsWith("image/") || /\.(png|jpe?g|webp)$/i.test(name))return "image";
  if(mime.startsWith("video/") || /\.(mp4|webm|mov)$/i.test(name))return "video";
  if(mime.startsWith("audio/") || /\.(mp3|wav|m4a|aac)$/i.test(name))return "audio";
  return null;
}

function referenceTypeLabel(type){
  if(type==="image")return "图片";
  if(type==="video")return "视频";
  return "音频";
}

function referenceTypeIcon(type){
  if(type==="image")return "🖼️";
  if(type==="video")return "🎞️";
  return "🎵";
}

function renderMediaPreview(){
  mediaPreview.innerHTML="";
  mediaPreview.classList.toggle("show",selectedVideoFiles.length>0);
  selectedVideoFiles.forEach((file,index)=>{
    const type=getFileMediaType(file);
    const chip=document.createElement("div");
    chip.className="media-chip";

    const icon=document.createElement("span");
    icon.textContent=referenceTypeIcon(type);

    const name=document.createElement("span");
    name.className="media-chip-name";
    name.textContent=file.name;
    name.title=file.name;

    const remove=document.createElement("button");
    remove.type="button";
    remove.textContent="×";
    remove.title="移除";
    remove.onclick=()=>{
      const removed=selectedVideoFiles[index];
      selectedVideoFiles.splice(index,1);
      if(getFileMediaType(removed)==="image" && removed.name===selectedImageName){
        selectedImageBase64=null;
        selectedImageName="";
        previewImg.src="";
        previewName.textContent="";
      }
      renderMediaPreview();
      previewAutoIntent();
    };

    chip.append(icon,name,remove);
    mediaPreview.appendChild(chip);
  });
  updateModeUI();
}

function clearVideoReferences(){
  selectedVideoFiles=[];
  mediaInput.value="";
  videoImageUrls.value="";
  videoVideoUrls.value="";
  videoAudioUrls.value="";
  videoReferencePanel.classList.remove("show");
  renderMediaPreview();
}

function speakText(text,button=null){
  let clean=(text || "").trim();
  clean=clean.replace(/— 已使用：.*$/gm,"").replace(/🧠 深度思考中\.\.\./g,"").replace(/🤖 自动判断模型中\.\.\./g,"").replace(/⚡ 正在思考\.\.\./g,"").replace(/正在调用豆包.*$/gm,"").trim();
  if(!clean)return;

  if(speechSynthesis.speaking){
    speechSynthesis.cancel();
    if(button)button.textContent="🔊 播放";
    return;
  }

  const rate=Number(document.getElementById("voiceRate").value || .95);
  const voices=speechSynthesis.getVoices();
  const isSpanish=/[áéíóúñ¿¡]/i.test(clean) || /\b(hola|gracias|adiós|buenos|buenas|amigo|señor|señora|por favor|como estas|cómo estás)\b/i.test(clean);
  let selectedVoice;

  if(isSpanish){
    selectedVoice=voices.find(v=>v.lang && v.lang.startsWith("es")) || voices.find(v=>/Spanish|Español|Monica|Paulina/i.test(v.name));
  }else{
    selectedVoice=voices.find(v=>/Xiaoxiao|Tingting|Meijia|Sinji/i.test(v.name)) || voices.find(v=>v.lang && v.lang.includes("zh"));
  }

  const u=new SpeechSynthesisUtterance(clean);
  u.voice=selectedVoice;
  u.lang=isSpanish?"es-ES":"zh-CN";
  u.rate=rate;
  u.pitch=1.05;
  u.volume=1;
  u.onstart=()=>{if(button)button.textContent="⏹ 停止"};
  u.onend=()=>{if(button)button.textContent="🔊 播放"};
  u.onerror=()=>{if(button)button.textContent="🔊 播放"};
  speechSynthesis.cancel();
  speechSynthesis.speak(u);
}

function startVoice(){
  const SpeechRecognition=window.SpeechRecognition || window.webkitSpeechRecognition;
  if(!SpeechRecognition){
    alert("当前浏览器不支持语音输入，建议用 Chrome 或 Safari。");
    return;
  }

  voiceResult="";
  voiceText.textContent="准备好了，随时开始";
  inputBox.style.display="none";
  voicePanel.style.display="flex";
  recognition=new SpeechRecognition();
  recognition.lang="zh-CN";
  recognition.continuous=true;
  recognition.interimResults=true;

  recognition.onresult=e=>{
    let finalText="",interimText="";
    for(let i=e.resultIndex;i<e.results.length;i++){
      const transcript=e.results[i][0].transcript;
      if(e.results[i].isFinal)finalText+=transcript;
      else interimText+=transcript;
    }
    if(finalText)voiceResult+=finalText;
    voiceText.textContent=voiceResult || interimText || "正在听你说话...";
  };

  recognition.onerror=()=>{voiceText.textContent="识别失败，请重试"};
  recognition.start();
}

function cancelVoice(){
  if(recognition){recognition.stop();recognition=null}
  voiceResult="";
  voicePanel.style.display="none";
  inputBox.style.display="flex";
}

function confirmVoice(){
  if(recognition){recognition.stop();recognition=null}
  const text=(voiceResult || voiceText.textContent || "").trim();
  voicePanel.style.display="none";
  inputBox.style.display="flex";
  if(text && !text.includes("准备好了") && !text.includes("没有识别")){
    input.value=text;
    handlePrimaryAction();
  }
  voiceResult="";
}

function clearImage(){
  const oldName=selectedImageName;
  selectedImageBase64=null;
  selectedImageName="";
  imageInput.value="";
  preview.style.display="none";
  previewImg.src="";
  previewName.textContent="";

  previewAutoIntent();
}

function compressImage(file){
  return new Promise((resolve,reject)=>{
    const reader=new FileReader();
    reader.onload=e=>{
      const img=new Image();
      img.onload=()=>{
        const canvas=document.createElement("canvas");
        const max=1536;
        let w=img.width,h=img.height;
        if(w>h && w>max){h=h*max/w;w=max}
        else if(h>max){w=w*max/h;h=max}
        canvas.width=Math.round(w);
        canvas.height=Math.round(h);
        const ctx=canvas.getContext("2d");
        ctx.drawImage(img,0,0,canvas.width,canvas.height);
        resolve(canvas.toDataURL("image/jpeg",.82));
      };
      img.onerror=()=>reject(new Error("图片读取失败"));
      img.src=e.target.result;
    };
    reader.onerror=()=>reject(new Error("文件读取失败"));
    reader.readAsDataURL(file);
  });
}

let viewerMedia={url:"",type:"image",filename:""};

function openMediaViewer(url,type="image",filename="jerry-ai-media"){
  viewerMedia={url,type,filename};
  const viewer=document.getElementById("mediaViewer");
  const body=document.getElementById("viewerBody");
  const imageTab=document.getElementById("viewerImageTab");
  const videoTab=document.getElementById("viewerVideoTab");
  const generate=document.getElementById("viewerGenerate");
  body.innerHTML="";
  if(type==="video"){
    const video=document.createElement("video");
    video.src=url;video.controls=true;video.playsInline=true;video.autoplay=false;video.preload="metadata";
    video.setAttribute("webkit-playsinline","");
    body.appendChild(video);
    imageTab.style.display="none";videoTab.classList.add("active");generate.style.display="none";
  }else{
    const img=document.createElement("img");
    img.src=url;img.alt="原图";img.draggable=false;
    body.appendChild(img);
    imageTab.style.display="";imageTab.classList.add("active");videoTab.classList.remove("active");generate.style.display="flex";
  }
  viewer.classList.add("show");
  viewer.setAttribute("aria-hidden","false");
  document.body.style.overflow="hidden";
}

function closeMediaViewer(){
  const viewer=document.getElementById("mediaViewer");
  viewer.classList.remove("show");viewer.setAttribute("aria-hidden","true");
  document.getElementById("viewerBody").innerHTML="";
  document.body.style.overflow="";
}

async function saveViewerMedia(){
  await downloadFileDirect(viewerMedia.url,viewerMedia.filename,viewerMedia.type);
}

async function downloadFileDirect(url,filename,type="file"){
  const safeName=filename || (type==="video"?"jerry-ai-video.mp4":"jerry-ai-image.png");

  try{
    // 优先直接读取媒体；若第三方地址不允许跨域，再自动改走后端下载代理。
    let response;
    try{
      response=await fetch(url,{mode:"cors",credentials:"omit"});
      if(!response.ok)throw new Error("HTTP "+response.status);
    }catch{
      const proxyUrl=buildDownloadProxyUrl(url,safeName,"attachment");
      response=await fetch(proxyUrl,{mode:"cors",credentials:"omit"});
      if(!response.ok)throw new Error("HTTP "+response.status);
    }

    const blob=await response.blob();
    const mime=blob.type || (type==="video"?"video/mp4":"image/png");
    const file=new File([blob],safeName,{type:mime});

    // iPhone/iPad/Android 支持时优先打开系统分享菜单，可保存到“文件”或相册。
    if(navigator.canShare && navigator.canShare({files:[file]})){
      await navigator.share({files:[file],title:safeName});
      return;
    }

    // 电脑及不支持文件分享的浏览器直接下载。
    const objectUrl=URL.createObjectURL(blob);
    triggerDownload(objectUrl,safeName);
    setTimeout(()=>URL.revokeObjectURL(objectUrl),15000);
  }catch(error){
    if(error && error.name==="AbortError")return;

    // 最后兜底：直接访问后端 attachment 地址，让浏览器执行下载。
    const proxyUrl=buildDownloadProxyUrl(url,safeName,"attachment");
    const a=document.createElement("a");
    a.href=proxyUrl;
    a.download=safeName;
    a.rel="noopener";
    document.body.appendChild(a);
    a.click();
    a.remove();
  }
}

function buildDownloadProxyUrl(url,filename,mode="attachment"){
  const base=WORKER_URL.replace(/\/+$/,"");
  return base+"/download?url="+encodeURIComponent(url)+
    "&filename="+encodeURIComponent(filename)+
    "&mode="+encodeURIComponent(mode);
}

function triggerDownload(url,filename){
  const a=document.createElement("a");
  a.href=url;a.download=filename;a.rel="noopener";
  document.body.appendChild(a);a.click();a.remove();
}

function sleep(ms){return new Promise(resolve=>setTimeout(resolve,ms))}
function escapeMarkdown(text){return String(text || "").replace(/[\\`*_{}\[\]()#+\-.!]/g,"\\$&")}

function toggleSidebar(force){
  const sidebar=document.getElementById("sidebar");
  if(typeof force==="boolean")sidebar.classList.toggle("show",force);
  else sidebar.classList.toggle("show");
}
