<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Jerry助手</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f5f5f5;
      display: flex;
      justify-content: center;
    }

    .app {
      width: 100%;
      max-width: 800px;
      height: 100vh;
      display: flex;
      flex-direction: column;
      background: white;
    }

    .header {
      padding: 16px;
      font-size: 22px;
      font-weight: bold;
      border-bottom: 1px solid #ddd;
      text-align: center;
    }

    .chat {
      flex: 1;
      padding: 16px;
      overflow-y: auto;
    }

    .msg {
      max-width: 75%;
      padding: 12px;
      margin: 10px 0;
      border-radius: 12px;
      line-height: 1.5;
      white-space: pre-wrap;
    }

    .user {
      margin-left: auto;
      background: #007aff;
      color: white;
    }

    .ai {
      margin-right: auto;
      background: #eee;
      color: #222;
    }

    .input-area {
      display: flex;
      padding: 12px;
      border-top: 1px solid #ddd;
      gap: 8px;
    }

    input {
      flex: 1;
      padding: 12px;
      font-size: 16px;
      border: 1px solid #ccc;
      border-radius: 8px;
    }

    button {
      padding: 12px 18px;
      font-size: 16px;
      border: none;
      border-radius: 8px;
      background: #007aff;
      color: white;
      cursor: pointer;
    }

    button:disabled {
      background: #aaa;
    }
  </style>
</head>
<body>
  <div class="app">
    <div class="header">Jerry助手</div>

    <div id="chat" class="chat"></div>

    <div class="input-area">
      <input id="input" placeholder="请输入你的问题..." />
      <button id="sendBtn" onclick="sendMessage()">发送</button>
    </div>
  </div>

  <script>
    const WORKER_URL = "https://jerry123.834833904.workers.dev";

    const chat = document.getElementById("chat");
    const input = document.getElementById("input");
    const sendBtn = document.getElementById("sendBtn");

    function addMessage(text, type) {
      const div = document.createElement("div");
      div.className = "msg " + type;
      div.textContent = text;
      chat.appendChild(div);
      chat.scrollTop = chat.scrollHeight;
      return div;
    }

    async function sendMessage() {
      const text = input.value.trim();
      if (!text) return;

      addMessage(text, "user");
      input.value = "";

      const aiMsg = addMessage("AI 正在思考...", "ai");
      sendBtn.disabled = true;

      try {
        const res = await fetch(WORKER_URL, {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({ message: text })
        });

        const data = await res.json();

        if (data.reply) {
          aiMsg.textContent = data.reply;
        } else {
          aiMsg.textContent = "出错了：" + JSON.stringify(data);
        }
      } catch (err) {
        aiMsg.textContent = "请求失败：" + err.message;
      } finally {
        sendBtn.disabled = false;
      }
    }

    input.addEventListener("keydown", function(e) {
      if (e.key === "Enter") {
        sendMessage();
      }
    });
  </script>
</body>
</html>
